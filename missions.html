<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0" />
  <title>Mission Archive — PANKAJ.AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
  <link rel="stylesheet" href="css/core.css">
  <style>
    #archive-hero { padding: 120px 20px 60px; text-align: center; background: radial-gradient(circle at 50% 100%, #00ffc80f, transparent 70%); }
    .arch-code { font-size: 10px; letter-spacing: .4em; color: var(--muted); margin-bottom: 12px; }
    .arch-title { font-family: 'Orbitron', sans-serif; font-size: clamp(32px, 8vw, 64px); font-weight: 900; letter-spacing: -0.02em; line-height: 1; margin-bottom: 24px; text-shadow: 0 0 40px rgba(0,255,200,0.2); }
    
    #missions-grid { padding: 20px; max-width: 1200px; margin: 0 auto 80px; display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
    .arch-card { 
      background: var(--panel); border: 1px solid var(--border); padding: 32px; text-decoration: none; position: relative; overflow: hidden;
      transition: all .4s cubic-bezier(0.4, 0, 0.2, 1); backdrop-filter: blur(10px);
    }
    .arch-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, var(--cyan) 0%, transparent 40%); opacity: 0; transition: opacity .4s; z-index: -1; }
    .arch-card:hover { border-color: var(--cyan); transform: translateY(-5px); box-shadow: 0 10px 40px rgba(0,255,200,0.1); }
    .arch-card:hover::before { opacity: 0.05; }
    
    .arch-id { font-size: 9px; letter-spacing: .2em; color: var(--muted); margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 12px; display: flex; justify-content: space-between; }
    .arch-name { font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 800; color: var(--cyan); margin-bottom: 16px; line-height: 1.3; }
    .arch-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .arch-tag { font-size: 9px; padding: 4px 8px; border: 1px solid var(--border); color: var(--dim); text-transform: uppercase; }
    
    .back-row { display: flex; justify-content: center; padding: 40px 20px; }
    .back-all { font-size: 10px; letter-spacing: .2em; color: var(--muted); text-decoration: none; text-transform: uppercase; border: 1px solid var(--border); padding: 12px 28px; transition: all .4s cubic-bezier(0.4, 0, 0.2, 1); display: inline-flex; align-items: center; gap: 8px; }
    .back-all:hover { border-color: var(--cyan); color: var(--cyan); background: var(--ghost); }
    .back-all:active { transform: scale(0.95); background: var(--cyan); color: var(--void); }

    .arch-footer { padding: 60px 20px; text-align: center; border-top: 1px solid var(--border); color: var(--muted); font-size: 10px; letter-spacing: .1em; }
    
    @media (min-width: 768px) {
      #archive-hero { padding: 160px 20px 100px; }
      #missions-grid { gap: 32px; padding: 40px; }
    }
  </style>
</head>
<body class="theme-cyan">
  <div id="cur"></div>
  <div id="cur-trail"></div>
  <div class="hc hc-tl"></div><div class="hc hc-tr"></div><div class="hc hc-bl"></div><div class="hc hc-br"></div>
  <canvas id="neural"></canvas>

  <nav id="statusbar">
    <div class="sb-left">
      <a href="index.html" class="sb-logo">PANKAJ.AI</a>
      <span class="sb-sep">|</span>
      <div class="sb-status">CENTRAL_ARCHIVE</div>
    </div>
    <div class="sb-right">
      <span id="live-clock">--:--:--</span>
      <a href="index.html#contact" class="sb-hire">INIT_MISSION</a>
    </div>
  </nav>

  <header id="archive-hero">
    <div class="arch-code r">DATABASE_INDEX: 0xFD2A</div>
    <h1 class="arch-title r">DEPLOYED<br>MISSIONS</h1>
    <div class="arch-code r">TOTAL_SYSTEMS: <span id="mission-count">--</span></div>
  </header>

  <section id="missions-grid" class="r2">
    <!-- Dynamic Content from js/data.js -->
  </section>

  <div class="back-row r">
    <a href="index.html" class="back-all">← BACK TO COMMAND CENTER</a>
  </div>

  <footer class="arch-footer">
    TERMINAL ACCESS GRANTED · DATA_ENCRYPTION: ACTIVE · © 2026 PANKAJ.AI
  </footer>

  <script src="js/data.js"></script>
  <script src="js/core.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const grid = document.getElementById('missions-grid');
      const countEl = document.getElementById('mission-count');
      if (grid && typeof PANKAJ_DB !== 'undefined') {
        countEl.textContent = PANKAJ_DB.projects.length;
        grid.innerHTML = PANKAJ_DB.projects.map(p => `
          <a href="${p.url}" class="arch-card">
            <div class="arch-id">
              <span>${p.id}</span>
              <span>${p.code}</span>
            </div>
            <div class="arch-name">${p.name}</div>
            <div class="arch-tags">
              ${p.chips.map(t => `<span class="arch-tag">${t}</span>`).join('')}
            </div>
          </a>
        `).join('');
      }
    });
  </script>
</body>
</html>
